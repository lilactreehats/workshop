<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stage {
            position: relative;
            width: 100vw;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .object {
            position: absolute;
            object-fit: contain;
            pointer-events: auto;
        }

        .tree {
            left: 14%;
            bottom: 19%;
            width: 12%;
            z-index: 3;
        }

        .chair {
            left: 29%;
            bottom: 13%;
            width: 12%;
            z-index: 5;
        }

        .desk {
            left: 28%;
            bottom: 19%;
            width: 30%;
            z-index: 4;
        }

        .corkboard {
            left: 53%;
            top: 25%;
            width: 13%;
            z-index: 3;
        }

        .door {
            left: 71.5%;
            bottom: 22.5%;
            width: 12%;
            z-index: 3;
        }

        .outlet {
            left: 68%;
            bottom: 30%;
            width: 3.5%;
            z-index: 5;
        }

        .plant-sticker {
            position: absolute;
            left: 16.1%;
            bottom: 26%;
            z-index: 6;

            width: 5.2%;
            min-width: 46px;

            background: #fffdf7;
            border: 1px solid rgba(0, 0, 0, 0.35);
            border-radius: 3px;
            padding: 2px 3px;
            box-sizing: border-box;

            font-family: "Courier New", monospace;
            font-size: clamp(4px, 0.32vw, 7px);
            line-height: 1.05;
            color: #111;
            text-align: center;

            transform: rotate(-7deg);
            box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.12);
        }

        .growth-postit {
            position: absolute;
            left: 59%;
            top: 29.4%;
            z-index: 6;

            width: 4.6%;
            min-width: 42px;
            aspect-ratio: 1 / 0.78;

            background: #fffdf7;
            border: 1px solid rgba(0, 0, 0, 0.22);
            padding: 3px 3px;
            box-sizing: border-box;

            font-family: "Courier New", monospace;
            font-size: clamp(4px, 0.3vw, 6px);
            line-height: 1.1;
            color: #111;

            transform: rotate(2deg);
            box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.10);
        }

        .growth-postit .label {
            display: block;
            margin-bottom: 1px;
            font-weight: bold;
        }

        .growth-postit .counter {
            display: block;
        }
    </style>
</head>

<body>
    <main class="stage">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">
        <img class="object door" src="door.png" alt="The workshop door">
        <img class="object outlet" src="outlet.png" alt="A small wall outlet">

        <div class="growth-postit">
            <span class="label">age:</span>
            <span class="counter" id="growth-counter">...</span>
        </div>
    </main>

    <script>
        const projectStart = new Date("2026-06-30T15:33:00-04:00");

        function updateGrowthCounter() {
            const now = new Date();
            const difference = now - projectStart;

            const totalMinutes = Math.floor(difference / (1000 * 60));
            const days = Math.floor(totalMinutes / (60 * 24));
            const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
            const minutes = totalMinutes % 60;

            document.getElementById("growth-counter").textContent =
                `${days}d ${hours}h ${minutes}m`;
        }

        updateGrowthCounter();
        setInterval(updateGrowthCounter, 60 * 1000);
    </script>
</body>
</html>
