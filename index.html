<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stage {
            position: relative;

            width: min(100vw, calc(100vh * 16 / 9));
            height: min(100vh, calc(100vw * 9 / 16));

            overflow: hidden;
        }

        .room,
        .room-dark {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: fill;
        }

        .room {
            z-index: 1;
        }

        .room-dark {
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .stage.lights-off .room-dark {
            opacity: 1;
        }

        .object {
            position: absolute;
            object-fit: contain;
            pointer-events: auto;
        }

        .tree {
            left: 14%;
            bottom: 19%;
            width: 12%;
            z-index: 3;
        }

        .chair {
            left: 29%;
            bottom: 13%;
            width: 12%;
            z-index: 5;
        }

        .desk {
            left: 28%;
            bottom: 19%;
            width: 30%;
            z-index: 4;
        }

        .corkboard {
            left: 53%;
            top: 25%;
            width: 13%;
            z-index: 3;
        }

        .door {
            left: 71.5%;
            bottom: 22.5%;
            width: 12%;
            z-index: 3;
        }

        .outlet {
            left: 68%;
            bottom: 30%;
            width: 3.5%;
            z-index: 5;
        }

        .cara-link {
            position: absolute;
            left: 50.2%;
            top: 50.5%;
            width: 6%;
            height: 4%;
            z-index: 8;
            cursor: pointer;
        }

        .plant-hotspot {
            position: absolute;
            left: 14%;
            bottom: 19%;
            width: 12%;
            height: 22%;
            z-index: 60;

            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
        }

        .plant-hotspot:focus-visible {
            outline: 2px dashed #7e6aa8;
            outline-offset: 4px;
        }

        .light-switch-hotspot {
            position: absolute;
            left: 68.6%;
            bottom: 47%;
            width: 2.4%;
            height: 7%;
            z-index: 60;

            background: transparent;
            border: 0;
            padding: 0;
            cursor: pointer;
        }

        .light-switch-hotspot:focus-visible {
            outline: 2px dashed #f4ead7;
            outline-offset: 4px;
        }

        .growth-postit {
            position: absolute;
            left: 59%;
            top: 29.4%;
            z-index: 6;

            width: 4.6%;
            min-width: 42px;
            aspect-ratio: 1 / 0.78;

            background: #fffdf7;
            border: 1px solid rgba(0, 0, 0, 0.22);
            padding: 3px 3px;
            box-sizing: border-box;

            font-family: "Courier New", monospace;
            font-size: clamp(4px, 0.3vw, 6px);
            line-height: 1.1;
            color: #111;

            transform: rotate(2deg);
            box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.10);
        }

        .growth-postit .label {
            display: block;
            margin-bottom: 1px;
            font-weight: bold;
        }

        .growth-postit .counter {
            display: block;
        }

        .sticker-modal {
            position: fixed;
            inset: 0;
            z-index: 100;

            display: none;
            justify-content: center;
            align-items: center;

            background: rgba(43, 34, 56, 0.45);
        }

        .sticker-modal.open {
            display: flex;
        }

        .sticker-window {
            position: relative;
            width: min(62vw, 360px);
            padding: 0;

            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        .sticker-window img {
            display: block;
            width: 100%;
            height: auto;
        }

        .close-sticker {
            position: absolute;
            top: -10px;
            right: -10px;

            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #2b2238;

            background: #fffdf7;
            color: #2b2238;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            z-index: 101;
        }
    </style>
</head>

<body>
    <main class="stage" id="stage">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">
        <img class="room-dark" src="room-dark.png" alt="The workshop with the lights turned off">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">
        <img class="object door" src="door.png" alt="The workshop door">
        <img class="object outlet" src="outlet.png" alt="A small wall outlet">

        <button
            class="plant-hotspot"
            type="button"
            aria-label="Open the growing since sticker"
            title="growing since"
        ></button>

        <button
            class="light-switch-hotspot"
            type="button"
            aria-label="Turn the workshop lights off"
            title="light switch"
        ></button>

        <a
            class="cara-link"
            href="https://cara.app/lilactreehats/all"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Lilac Tree Hats on Cara"
            title="Cara"
        ></a>

        <div class="growth-postit">
            <span class="label">age:</span>
            <span class="counter" id="growth-counter">...</span>
        </div>
    </main>

    <div class="sticker-modal" id="sticker-modal" aria-hidden="true">
        <div class="sticker-window" role="dialog" aria-label="Growing since sticker">
            <button class="close-sticker" type="button" aria-label="Close sticker">×</button>
            <img src="growth-sticker.png" alt="Growing since June 30, 2026 at 3:33 PM sticker">
        </div>
    </div>

    <script>
        const projectStart = new Date("2026-06-30T15:33:00-04:00");

        function updateGrowthCounter() {
            const growthCounter = document.getElementById("growth-counter");
            if (!growthCounter) return;

            const now = new Date();
            const difference = now - projectStart;

            const totalMinutes = Math.floor(difference / (1000 * 60));
            const days = Math.floor(totalMinutes / (60 * 24));
            const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
            const minutes = totalMinutes % 60;

            growthCounter.textContent = `${days}d ${hours}h ${minutes}m`;
        }

        updateGrowthCounter();
        setInterval(updateGrowthCounter, 60 * 1000);

        const plantHotspot = document.querySelector(".plant-hotspot");
        const stickerModal = document.getElementById("sticker-modal");
        const closeSticker = document.querySelector(".close-sticker");

        function openSticker() {
            stickerModal.classList.add("open");
            stickerModal.setAttribute("aria-hidden", "false");
        }

        function closeStickerModal() {
            stickerModal.classList.remove("open");
            stickerModal.setAttribute("aria-hidden", "true");
        }

        plantHotspot.addEventListener("click", openSticker);
        closeSticker.addEventListener("click", closeStickerModal);

        stickerModal.addEventListener("click", function(event) {
            if (event.target === stickerModal) {
                closeStickerModal();
            }
        });

        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape") {
                closeStickerModal();
            }
        });

        const stage = document.getElementById("stage");
        const lightSwitchHotspot = document.querySelector(".light-switch-hotspot");

        lightSwitchHotspot.addEventListener("click", function() {
            stage.classList.toggle("lights-off");

            if (stage.classList.contains("lights-off")) {
                lightSwitchHotspot.setAttribute("aria-label", "Turn the workshop lights on");
            } else {
                lightSwitchHotspot.setAttribute("aria-label", "Turn the workshop lights off");
            }
        });
    </script>
</body>
</html>
