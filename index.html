<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stage {
            position: relative;
            width: 100vw;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .object {
            position: absolute;
            object-fit: contain;
            pointer-events: auto;
        }

        .tree {
            left: 14%;
            bottom: 19%;
            width: 12%;
            z-index: 3;
        }

        .chair {
            left: 29%;
            bottom: 13%;
            width: 12%;
            z-index: 3;
        }

        .desk {
            left: 28%;
            bottom: 19%;
            width: 30%;
            z-index: 4;
        }

        .corkboard {
            left: 53%;
            top: 25%;
            width: 13%;
            z-index: 3;
        }

        /* Temporary plant sticker — code version for placement testing */

        .plant-sticker {
            position: absolute;
            left: 9.5%;
            bottom: 35%;
            z-index: 6;

            background: #fffdf7;
            border: 1px solid rgba(0, 0, 0, 0.35);
            border-radius: 4px;
            padding: 4px 9px;

            font-family: "Courier New", monospace;
            font-size: clamp(8px, 0.65vw, 12px);
            line-height: 1.1;
            color: #111;
            white-space: nowrap;

            transform: rotate(-6deg);
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.12);
        }

        /* Smaller white post-it with live counter */

        .growth-postit {
            position: absolute;
            left: 60%;
            top: 30%;
            z-index: 6;

            width: 7.5%;
            min-width: 72px;
            aspect-ratio: 1 / 0.72;

            background: #fffdf7;
            border: 1px solid rgba(0, 0, 0, 0.22);
            padding: 5px 6px;
            box-sizing: border-box;

            font-family: "Courier New", monospace;
            font-size: clamp(6px, 0.48vw, 9px);
            line-height: 1.2;
            color: #111;

            transform: rotate(2deg);
            box-shadow: 2px 3px 0 rgba(0, 0, 0, 0.10);
        }

        .growth-postit .label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
        }

        .growth-postit .counter {
            display: block;
        }
    </style>
</head>

<body>
    <main class="stage">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">

        <div class="plant-sticker">
            growing since June 30, 2026 · 3:33 PM
        </div>

        <div class="growth-postit">
            <span class="label">age:</span>
            <span class="counter" id="growth-counter">counting...</span>
        </div>
    </main>

    <script>
        const projectStart = new Date("2026-06-30T15:33:00-04:00");

        function updateGrowthCounter() {
            const now = new Date();
            const difference = now - projectStart;

            const totalMinutes = Math.floor(difference / (1000 * 60));
            const days = Math.floor(totalMinutes / (60 * 24));
            const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
            const minutes = totalMinutes % 60;

            document.getElementById("growth-counter").textContent =
                `${days}d · ${hours}h · ${minutes}m`;
        }

        updateGrowthCounter();
        setInterval(updateGrowthCounter, 60 * 1000);
    </script>
</body>
</html>
