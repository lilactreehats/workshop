<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stage {
            position: relative;
            width: 100vw;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .object {
            position: absolute;
            object-fit: contain;
            pointer-events: auto;
        }

        .tree {
            left: 5%;
            bottom: 19%;
            width: 15%;
            z-index: 3;
        }

        .chair {
            left: 30%;
            bottom: 17%;
            width: 12%;
            z-index: 3;
        }

        .desk {
            left: 27%;
            bottom: 20%;
            width: 32%;
            z-index: 4;
        }

        .corkboard {
            left: 55%;
            top: 29%;
            width: 13%;
            z-index: 3;
        }
    </style>
</head>

<body>
    <main class="stage">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">
    </main>
</body>
</html>
