<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        .workshop {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 1;
        }

        .object {
            position: absolute;
            z-index: 2;
            object-fit: contain;
        }

        .tree {
            left: 7%;
            bottom: 19%;
            width: 10%;
        }

        .chair {
            left: 28%;
            top: 25%;
            width: 12%;
        }

        .desk {
            left: 42%;
            bottom: 16%;
            width: 30%;
        }

        .corkboard {
            right: 13%;
            top: 18%;
            width: 16%;
        }
    </style>
</head>

<body>
    <main class="workshop">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">
    </main>
</body>
</html>
