<!DOCTYPE html>
<html>
<head>
    <title>The Workshop</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #f4efe8;
            overflow: hidden;
        }

        .workshop {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .room {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 1;
        }

        .object {
            position: absolute;
            object-fit: contain;
            pointer-events: auto;
        }

        /* floor objects */

        .tree {
            left: 8%;
            bottom: 19%;
            width: 9%;
            z-index: 3;
        }

        .chair {
            left: 29%;
            bottom: 31%;
            width: 12%;
            z-index: 3;
        }

        .desk {
            left: 41%;
            bottom: 15%;
            width: 29%;
            z-index: 4;
        }

        /* wall object */

        .corkboard {
            left: 72%;
            top: 21%;
            width: 13%;
            z-index: 3;
        }
    </style>
</head>

<body>
    <main class="workshop">
        <img class="room" src="room.jpg" alt="The empty Lilac Workshop">

        <img class="object tree" src="tree.png" alt="A small lilac tree">
        <img class="object chair" src="chair.png" alt="A wooden chair">
        <img class="object desk" src="desk.png" alt="A desk with a laptop">
        <img class="object corkboard" src="corkboard.png" alt="A corkboard with one note">
    </main>
</body>
</html>
